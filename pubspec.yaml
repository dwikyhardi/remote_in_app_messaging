name: remote_in_app_messaging
description: Host-agnostic, JSON-driven in-app messaging for Flutter. Drive modal, bottom sheet and fullscreen messages from a remote JSON payload (e.g. Firebase Remote Config) with targeting, A/B variants and frequency caps.
version: 0.1.0
homepage: https://github.com/dwikyhardi/remote_in_app_messaging
repository: https://github.com/dwikyhardi/remote_in_app_messaging

environment:
  sdk: "^3.8.0"
  flutter: ">=3.29.0"

dependencies:
  collection: ^1.19.0
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  freezed_annotation: ^3.1.0
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  json_annotation: ^4.9.0
  meta: ^1.15.0

dev_dependencies:
  build_runner: ^2.10.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  hive_ce_generator: ^1.10.0
  json_serializable: ^6.11.1
  pedantic_mono: ^1.34.0

flutter:
